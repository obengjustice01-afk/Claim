version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    volumes:
      - .:/app
    command: python app.py
    networks:
      - globalclaim

  # Optional: PostgreSQL for production (instead of SQLite)
  # db:
  #   image: postgres:15
  #   environment:
  #     - POSTGRES_DB=globalclaim
  #     - POSTGRES_USER=admin
  #     - POSTGRES_PASSWORD=password123
  #   volumes:
  #     - db_data:/var/lib/postgresql/data
  #   networks:
  #     - globalclaim

networks:
  globalclaim:
    driver: bridge

